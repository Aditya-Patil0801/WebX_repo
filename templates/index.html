<!DOCTYPE html>
<html>
<head>
    <title>My Portfolio</title>
    <style>
        body {
            font-family: Arial;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
            text-align: center;
        }

        .header {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #333;
    color: white;
    padding: 15px;
    position: relative;
    }

        .logo {
    position: absolute;
    left: 20px;
    width: 60px;
    }

    .header h1 {
    margin: 0;
    font-size: 28px;
   }
        section {
    padding: 20px 0;  
    }

        h2 {
            color: #333;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        form {
            width: 60%;
            margin: auto;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            padding: 12px 25px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

<header class="header">
    <img src="{{ url_for('static', filename='vcet_logo') }}" 
         alt="Logo" class="logo">

    <h1>My Portfolio</h1>
</header>

<section>
    <h2>Education</h2>
    <p>Bachelor of Engineering - Information Engineering</p>
</section>

<section>
    <h2>Professional Skills</h2>
    <ul>
        <li>Python</li>
        <li>Machine Learning</li>
        <li>Web Development</li>
    </ul>
</section>

<section>
    <h2>Contact Me</h2>
    <form action="/contact" method="POST">

        <input type="text" name="name" placeholder="Enter Name"
               required minlength="3" maxlength="50"
               pattern="[A-Za-z ]+">

        <input type="email" name="email" placeholder="Enter Email"
               required>

        <textarea name="message" placeholder="Your Message"
                  required minlength="10" maxlength="200"></textarea>

        <button type="submit">Submit</button>

    </form>
</section>

</body>
</html>
