<!DOCTYPE html>
<html ng-app="studentApp">
<head>
    <title>Student Registration Form</title>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
    <style>
        body {
            font-family: Arial;
            background-color: #f2f2f2;
        }
        .form-box {
            width: 400px;
            margin: auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        .error {
            color: red;
        }
        .success {
            color: green;
        }
    </style>
</head>

<body ng-controller="StudentController">

<div class="form-box">
    <h2>Student Registration</h2>

    <form name="studentForm" ng-submit="register()" novalidate>

        <!-- Name -->
        <label>Name:</label><br>
        <input type="text" ng-model="student.name" name="name" required>
        <span class="error" ng-show="studentForm.name.$touched && studentForm.name.$invalid">
            Name is required
        </span>
        <br><br>

        <!-- Email -->
        <label>Email:</label><br>
        <input type="email" ng-model="student.email" name="email" required>
        <span class="error" ng-show="studentForm.email.$touched && studentForm.email.$invalid">
            Enter valid email
        </span>
        <br><br>

        <!-- Phone -->
        <label>Phone:</label><br>
        <input type="text" ng-model="student.phone" name="phone" ng-minlength="10" required>
        <span class="error" ng-show="studentForm.phone.$touched && studentForm.phone.$invalid">
            Minimum 10 digits required
        </span>
        <br><br>

        <!-- Password -->
        <label>Password:</label><br>
        <input type="password" ng-model="student.password" name="password" ng-minlength="6" required>
        <span class="error" ng-show="studentForm.password.$touched && studentForm.password.$invalid">
            Password must be at least 6 characters
        </span>
        <br><br>

        <button type="submit">Register</button>
    </form>

    <!-- Success Message -->
    <p class="success" ng-show="submitted">
        Registration Successful for {{student.name}}!
    </p>

</div>

<script>
    var app = angular.module("studentApp", []);

    app.controller("StudentController", function($scope) {
        $scope.submitted = false;

        $scope.register = function() {
            if ($scope.studentForm.$valid) {
                $scope.submitted = true;
            }
        };
    });
</script>

</body>
</html>
